name: CI and deploy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci_placeholder?schema=public
  AUTH_SECRET: "ci-placeholder-secret-min-32-chars-ok!!"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - name: Prepare SSH key and known_hosts
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST:-}" ] || [ -z "${VPS_USER:-}" ] || [ -z "${SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::Set repository secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (full private key, multiline OK)."
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          if ! head -1 ~/.ssh/vps_deploy_key | grep -qE '^-----BEGIN .+PRIVATE KEY'; then
            echo "::error::VPS_SSH_KEY must be a PEM/OpenSSH private key (line 1: -----BEGIN ... PRIVATE KEY-----)"
            exit 1
          fi
          ssh-keyscan -t rsa,ed25519,ecdsa -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Smoke test SSH (key auth)
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vps_deploy_key \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            "echo SSH_OK && whoami && hostname"

      - name: Deploy on VPS
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/vps_deploy_key \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${VPS_USER}@${VPS_HOST}" \
            bash -s <<'ENDDEPLOY'
          set -euo pipefail
          echo "==== DEPLOY_START $(date -u +%H:%M:%SZ) ===="
          export NODE_ENV=production
          APP_DIR="/var/www/client-say-app"
          REPO_URL="https://github.com/vadimka775319/client-say-app.git"

          set +eu
          if [ -f "$HOME/.nvm/nvm.sh" ]; then
            . "$HOME/.nvm/nvm.sh" || true
            nvm use default 2>/dev/null || true
          fi
          if command -v fnm >/dev/null 2>&1; then
            eval "$(fnm env)" || true
          fi
          if [ -f "$HOME/.bashrc" ]; then
            . "$HOME/.bashrc" || true
          fi
          if [ -f "$HOME/.profile" ]; then
            . "$HOME/.profile" || true
          fi
          set -euo pipefail

          echo "=== deploy diagnostics (VPS) ==="
          echo "USER=$(whoami) HOME=$HOME PATH=$PATH"
          command -v node >/dev/null && node -v || echo "ERROR: node not in PATH"
          command -v npm >/dev/null && npm -v || echo "ERROR: npm not in PATH"
          command -v git >/dev/null && git --version || echo "ERROR: git not in PATH"

          if ! command -v npm >/dev/null 2>&1; then
            echo "FATAL: npm not in PATH after profile load." >&2
            exit 1
          fi
          if ! command -v git >/dev/null 2>&1; then
            echo "FATAL: git not installed." >&2
            exit 1
          fi

          NPM_PREFIX="$(npm config get prefix 2>/dev/null || true)"
          if [ -n "$NPM_PREFIX" ] && [ -d "$NPM_PREFIX/bin" ]; then
            export PATH="$NPM_PREFIX/bin:$PATH"
          fi

          if ! mkdir -p "$APP_DIR"; then
            echo "FATAL: cannot mkdir $APP_DIR. On VPS: sudo mkdir -p $APP_DIR && sudo chown -R $(whoami):$(whoami) $APP_DIR" >&2
            exit 1
          fi
          cd "$APP_DIR" || { echo "FATAL: cannot cd $APP_DIR" >&2; exit 1; }

          export GIT_TERMINAL_PROMPT=0
          # dubious ownership в /var/www под root → частый exit 128
          git config --global --add safe.directory '*' 2>/dev/null || git config --global --add safe.directory "$APP_DIR" 2>/dev/null || true

          if [ ! -d ".git" ]; then
            echo "No .git — backup .env, wipe dir, shallow clone (rm -rf * не трогает dotfiles — из-за этого ломался clone)" >&2
            ENV_BAK=""
            if [ -f "$APP_DIR/.env" ]; then
              ENV_BAK=$(mktemp /tmp/clientsay.env.XXXXXX)
              cp -a "$APP_DIR/.env" "$ENV_BAK"
            fi
            # Нельзя удалять текущую рабочую директорию: после rm -rf git получит ENOENT cwd.
            cd /
            rm -rf "$APP_DIR"
            mkdir -p "$(dirname "$APP_DIR")"
            if ! git clone --depth 1 -b main "$REPO_URL" "$APP_DIR"; then
              echo "Clone branch main failed, trying master..." >&2
              git clone --depth 1 -b master "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            if [ -n "${ENV_BAK:-}" ] && [ -f "$ENV_BAK" ]; then
              mv "$ENV_BAK" "$APP_DIR/.env"
              chmod 600 "$APP_DIR/.env" 2>/dev/null || true
            fi
          else
            git remote set-url origin "$REPO_URL"
          fi

          cd "$APP_DIR"
          BRANCH=main
          if ! git fetch origin main; then
            echo "git fetch origin main failed, trying master..." >&2
            BRANCH=master
            if ! git fetch origin master; then
              echo "git fetch failed. Diagnostics:" >&2
              git remote -v >&2 || true
              git status >&2 || true
              git ls-remote --heads origin >&2 || true
              exit 128
            fi
          fi
          git reset --hard "origin/${BRANCH}"

          if [ -f .env ]; then
            set -a
            . ./.env
            set +a
          fi

          (
            set -euo pipefail
            export NODE_ENV=production
            if [ -n "${NPM_PREFIX:-}" ] && [ -d "$NPM_PREFIX/bin" ]; then
              export PATH="$NPM_PREFIX/bin:$PATH"
            fi
            export AUTH_SECRET="${AUTH_SECRET:-ci-build-placeholder-secret-min-32-chars!!}"
            export DATABASE_URL="${DATABASE_URL:-postgresql://127.0.0.1:5432/build_placeholder?schema=public}"
            npm ci
            npm run build
          )

          if ! command -v pm2 >/dev/null 2>&1; then
            echo "pm2 not found; installing globally..."
            npm install -g pm2
          fi

          pm2 restart client-say-app || pm2 start npm --name client-say-app -- start
          pm2 save
          echo "==== DEPLOY_DONE ===="
          ENDDEPLOY

name: Deploy to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/client-say-app"
            REPO_URL="https://github.com/vadimka775319/client-say-app.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d ".git" ]; then
              rm -rf "$APP_DIR"/*
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            git fetch origin main
            git reset --hard origin/main

            npm install
            npm run build
            pm2 restart client-say-app || pm2 start npm --name client-say-app -- start
            pm2 save

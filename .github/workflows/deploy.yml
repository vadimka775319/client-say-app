name: CI and deploy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci_placeholder?schema=public
  AUTH_SECRET: "ci-placeholder-secret-min-32-chars-ok!!"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            export NODE_ENV=production
            APP_DIR="/var/www/client-say-app"
            REPO_URL="https://github.com/vadimka775319/client-say-app.git"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d ".git" ]; then
              rm -rf "$APP_DIR"/*
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            git fetch origin main
            git reset --hard origin/main

            npm ci
            npx prisma generate
            npm run build

            pm2 restart client-say-app || pm2 start npm --name client-say-app -- start
            pm2 save

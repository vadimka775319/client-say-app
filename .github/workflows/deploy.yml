name: CI and deploy

on:
  push:
    branches: ["main"]
  pull_request:

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci_placeholder?schema=public
  AUTH_SECRET: "ci-placeholder-secret-min-32-chars-ok!!"
  # См. предупреждение GitHub Actions про runtime Node для checkout/setup-node
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            export NODE_ENV=production
            APP_DIR="/var/www/client-say-app"
            REPO_URL="https://github.com/vadimka775319/client-say-app.git"

            # Неинтерактивный SSH часто без nvm/fnm в PATH — подтянуть как при входе по SSH.
            if [ -f "$HOME/.nvm/nvm.sh" ]; then
              # shellcheck disable=SC1090
              . "$HOME/.nvm/nvm.sh"
              nvm use default 2>/dev/null || true
            fi
            if command -v fnm >/dev/null 2>&1; then
              eval "$(fnm env)"
            fi
            if [ -f "$HOME/.bashrc" ]; then
              # shellcheck disable=SC1090
              . "$HOME/.bashrc"
            fi
            if [ -f "$HOME/.profile" ]; then
              # shellcheck disable=SC1090
              . "$HOME/.profile"
            fi

            echo "=== deploy diagnostics (VPS) ==="
            echo "USER=$(whoami) HOME=$HOME PATH=$PATH"
            command -v node >/dev/null && node -v || echo "ERROR: node не в PATH"
            command -v npm >/dev/null && npm -v || echo "ERROR: npm не в PATH"
            command -v git >/dev/null && git --version || echo "ERROR: git не в PATH"

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d ".git" ]; then
              rm -rf "$APP_DIR"/*
              git clone "$REPO_URL" "$APP_DIR"
              cd "$APP_DIR"
            fi

            git fetch origin main
            git reset --hard origin/main

            # Секреты и DATABASE_URL с VPS (файл в .gitignore). Нужны для runtime; для сборки ниже — запасные значения.
            if [ -f .env ]; then
              set -a
              # shellcheck disable=SC1091
              . ./.env
              set +a
            fi

            (
              set -euo pipefail
              export NODE_ENV=production
              export AUTH_SECRET="${AUTH_SECRET:-ci-build-placeholder-secret-min-32-chars!!}"
              export DATABASE_URL="${DATABASE_URL:-postgresql://127.0.0.1:5432/build_placeholder?schema=public}"
              npm ci
              npm run build
            )

            command -v pm2 >/dev/null 2>&1 || { echo "pm2 не найден в PATH. Установите: npm i -g pm2" >&2; exit 1; }

            pm2 restart client-say-app || pm2 start npm --name client-say-app -- start
            pm2 save

# Локальный PostgreSQL в Docker — совпадает с DATABASE_URL в .env.example
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: client_say
    volumes:
      - clientsay_pg_data:/var/lib/postgresql/data

volumes:
  clientsay_pg_data:
